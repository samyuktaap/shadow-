<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #121212;
      color: white;
      margin: 0;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .logo { font-weight: bold; font-size: 20px; color: #ff3333; }
    .status-card {
      background: #1e1e1e;
      border-radius: 12px;
      padding: 15px;
      text-align: center;
      border: 1px solid #333;
    }
    .score { font-size: 48px; font-weight: bold; color: #ff3333; }
    .label { font-size: 12px; color: #888; margin-top: 4px; }
    .shield-box {
      margin-top: 20px;
      background: #1e1e1e;
      border-radius: 12px;
      padding: 12px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid #333;
    }
    .toggle-btn {
      background: #333;
      color: #888;
      border: none;
      padding: 5px 15px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }
    .toggle-btn.active {
      background: #00ff88;
      color: #004422;
      box-shadow: 0 0 10px rgba(0,255,136,0.5);
    }
    .footer-btn {
      width: 100%;
      background: #ff3333;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      margin-top: 15px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">DataShadow</div>
    <div class="version">v1.0</div>
  </div>
  <div class="status-card">
    <div class="score" id="score">--</div>
    <div class="label">CURRENT PRIVACY RISK</div>
  </div>

  <div class="shield-box">
    <span>Shadow Shield</span>
    <button class="toggle-btn" id="shield-toggle">OFF</button>
  </div>

  <button class="footer-btn" id="analyze-btn">Full Analysis</button>
  <script src="popup.js"></script>
</body>
</html>
